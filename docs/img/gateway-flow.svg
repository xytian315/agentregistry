<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowSolid" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/>
    </marker>
    <marker id="arrowReturn" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#0f0f0f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#e5e7eb">Agentgateway Flow</text>

  <!-- Participant boxes -->
  <rect x="60" y="56" width="120" height="36" rx="8" fill="url(#headerGrad)"/>
  <text x="120" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="white">AI IDE / Client</text>

  <rect x="270" y="56" width="120" height="36" rx="8" fill="url(#headerGrad)"/>
  <text x="330" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="white">Agentgateway</text>

  <rect x="480" y="56" width="120" height="36" rx="8" fill="url(#headerGrad)"/>
  <text x="540" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="white">filesystem MCP</text>

  <rect x="660" y="56" width="120" height="36" rx="8" fill="url(#headerGrad)"/>
  <text x="720" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="white">github MCP</text>

  <!-- Lifelines -->
  <line x1="120" y1="92" x2="120" y2="490" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="330" y1="92" x2="330" y2="490" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="540" y1="92" x2="540" y2="490" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="720" y1="92" x2="720" y2="490" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Message 1: Connect -->
  <line x1="120" y1="140" x2="330" y2="140" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="225" y="133" text-anchor="middle" font-size="11" fill="#a5b4fc">Connect (MCP over HTTP)</text>

  <!-- Message 2: Available tools -->
  <line x1="330" y1="180" x2="120" y2="180" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>
  <text x="225" y="173" text-anchor="middle" font-size="11" fill="#6ee7b7">Available tools from all servers</text>

  <!-- Separator 1 -->
  <rect x="40" y="210" width="720" height="28" rx="6" fill="#064e3b" fill-opacity="0.4" stroke="#065f46" stroke-width="1"/>
  <text x="400" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#34d399">read_file()</text>

  <!-- Message 3: Call read_file -->
  <line x1="120" y1="260" x2="330" y2="260" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="225" y="253" text-anchor="middle" font-size="11" fill="#a5b4fc">Call read_file()</text>

  <!-- Message 4: Forward to filesystem -->
  <line x1="330" y1="290" x2="540" y2="290" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="435" y="283" text-anchor="middle" font-size="11" fill="#a5b4fc">Forward to filesystem</text>

  <!-- Message 5: File contents -->
  <line x1="540" y1="320" x2="330" y2="320" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>
  <text x="435" y="313" text-anchor="middle" font-size="11" fill="#6ee7b7">File contents</text>

  <!-- Message 6: Return result -->
  <line x1="330" y1="350" x2="120" y2="350" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>
  <text x="225" y="343" text-anchor="middle" font-size="11" fill="#6ee7b7">Return result</text>

  <!-- Separator 2 -->
  <rect x="40" y="375" width="720" height="28" rx="6" fill="#1e1b4b" fill-opacity="0.5" stroke="#312e81" stroke-width="1"/>
  <text x="400" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">create_issue()</text>

  <!-- Message 7: Call create_issue -->
  <line x1="120" y1="425" x2="330" y2="425" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="225" y="418" text-anchor="middle" font-size="11" fill="#a5b4fc">Call create_issue()</text>

  <!-- Message 8: Forward to github -->
  <line x1="330" y1="455" x2="720" y2="455" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowSolid)"/>
  <text x="525" y="448" text-anchor="middle" font-size="11" fill="#a5b4fc">Forward to github</text>

  <!-- Message 9: Issue created -->
  <line x1="720" y1="485" x2="330" y2="485" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>
  <text x="525" y="478" text-anchor="middle" font-size="11" fill="#6ee7b7">Issue created</text>
</svg>
