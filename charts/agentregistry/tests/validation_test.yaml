suite: Validation
templates:
  - validate.yaml

tests:
  # ── JWT key validation ───────────────────────────────────────────────────────

  - it: renders nothing when jwtPrivateKey and database.password are set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.password: changeme
      database.host: mydb.example.com
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when config.existingSecret is set
    set:
      config.existingSecret: my-existing-secret
      database.password: changeme
      database.host: mydb.example.com
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when global.existingSecret is set
    set:
      global.existingSecret: global-secret
      database.host: mydb.example.com
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when jwtPrivateKey is empty and no existingSecret is provided
    set:
      database.password: changeme
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  - it: fails when jwtPrivateKey is not a valid hex string
    set:
      config.jwtPrivateKey: "not-hex!!"
      database.password: changeme
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  # ── Database password validation ─────────────────────────────────────────────

  - it: fails when database.password is empty and no existingSecret is provided
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"

  - it: renders nothing when database.existingSecret is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.existingSecret: pg-secret
      database.host: mydb.example.com
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when database.url is set
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.url: "postgres://user:pass@host:5432/db"
    asserts:
      - hasDocuments:
          count: 0
  # ── Database host validation ─────────────────────────────────────────────────

  - it: fails when database.host and database.url are both unset
    set:
      config.jwtPrivateKey: deadbeef1234567890abcdef
      database.password: changeme
    asserts:
      - failedTemplate:
          errorPattern: "CHART CONFIGURATION ERROR"
