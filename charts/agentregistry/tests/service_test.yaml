suite: Service
templates:
  - service.yaml

tests:
  - it: renders a Service by default
    asserts:
      - isKind:
          of: Service
      - hasDocuments:
          count: 1

  - it: has correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry

  - it: has standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm

  - it: defaults to ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: exposes http port 12121
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 12121
            targetPort: 8080
            protocol: TCP

  - it: exposes grpc port 21212
    asserts:
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 21212
            targetPort: 21212
            protocol: TCP

  - it: exposes mcp port 31313
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mcp
            port: 31313
            targetPort: 31313
            protocol: TCP

  - it: has selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: sets NodePort type
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: sets explicit nodePort for http when NodePort type
    set:
      service.type: NodePort
      service.nodePorts.http: 30080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 12121
            targetPort: 8080
            protocol: TCP
            nodePort: 30080

  - it: sets explicit nodePort for mcp when NodePort type
    set:
      service.type: NodePort
      service.nodePorts.mcp: 31313
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mcp
            port: 31313
            targetPort: 31313
            protocol: TCP
            nodePort: 31313

  - it: sets LoadBalancer type
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: sets loadBalancerIP when LoadBalancer type
    set:
      service.type: LoadBalancer
      service.loadBalancerIP: 1.2.3.4
    asserts:
      - equal:
          path: spec.loadBalancerIP
          value: 1.2.3.4

  - it: does not set loadBalancerIP for ClusterIP type
    set:
      service.loadBalancerIP: 1.2.3.4
    asserts:
      - notExists:
          path: spec.loadBalancerIP

  - it: sets clusterIP when specified
    set:
      service.clusterIP: None
    asserts:
      - equal:
          path: spec.clusterIP
          value: None

  - it: does not set clusterIP when empty
    asserts:
      - notExists:
          path: spec.clusterIP

  - it: sets sessionAffinity
    set:
      service.sessionAffinity: ClientIP
    asserts:
      - equal:
          path: spec.sessionAffinity
          value: ClientIP

  - it: adds custom annotations
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb

  - it: applies fullnameOverride
    set:
      fullnameOverride: myapp
    asserts:
      - equal:
          path: metadata.name
          value: myapp
