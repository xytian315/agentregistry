suite: RBAC
templates:
  - rbac.yaml

tests:
  # ── Default: no watchedNamespaces ────────────────────────────────────────────

  - it: renders ClusterRole and ClusterRoleBinding by default
    asserts:
      - hasDocuments:
          count: 2

  - it: first document is a ClusterRole by default
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole

  - it: second document is a ClusterRoleBinding by default
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: ClusterRole name includes namespace suffix
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-NAMESPACE

  - it: ClusterRoleBinding name includes namespace suffix
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-NAMESPACE

  - it: ClusterRoleBinding references the correct ClusterRole
    documentIndex: 1
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-agentregistry-NAMESPACE

  - it: ClusterRoleBinding subject uses the ServiceAccount
    documentIndex: 1
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-agentregistry
            namespace: NAMESPACE

  - it: ClusterRole has standard labels
    documentIndex: 0
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME

  - it: ClusterRole includes all namespace-scoped resource rules
    documentIndex: 0
    asserts:
      - isNotNull:
          path: rules
      - contains:
          path: rules
          content:
            apiGroups:
              - kagent.dev
            resources:
              - agents
              - remotemcpservers
              - mcpservers
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: ClusterRole includes namespaces read rule
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
            verbs:
              - get
              - list
              - watch

  # ── watchedNamespaces set ────────────────────────────────────────────────────

  - it: renders ClusterRole, ClusterRoleBinding, and per-namespace Role/RoleBinding when watchedNamespaces is set
    set:
      rbac.watchedNamespaces:
        - ns-a
    asserts:
      # ClusterRole + ClusterRoleBinding + Role(ns-a) + RoleBinding(ns-a) + Role(NAMESPACE) + RoleBinding(NAMESPACE)
      - hasDocuments:
          count: 6

  - it: first document is still a ClusterRole when watchedNamespaces is set
    set:
      rbac.watchedNamespaces:
        - ns-a
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole

  - it: ClusterRole only has namespaces rule when watchedNamespaces is set
    set:
      rbac.watchedNamespaces:
        - ns-a
    documentIndex: 0
    asserts:
      - equal:
          path: rules
          value:
            - apiGroups:
                - ""
              resources:
                - namespaces
              verbs:
                - get
                - list
                - watch

  - it: Role is created in the watched namespace
    set:
      rbac.watchedNamespaces:
        - ns-a
    documentIndex: 2
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: ns-a
      - contains:
          path: rules
          content:
            apiGroups:
              - kagent.dev
            resources:
              - agents
              - remotemcpservers
              - mcpservers
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: Role is also created in the installation namespace
    set:
      rbac.watchedNamespaces:
        - ns-a
    documentIndex: 4
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: NAMESPACE

  - it: installation namespace is not duplicated when already in watchedNamespaces
    set:
      rbac.watchedNamespaces:
        - NAMESPACE
    asserts:
      # ClusterRole + ClusterRoleBinding + Role(NAMESPACE) + RoleBinding(NAMESPACE)
      - hasDocuments:
          count: 4

  # ── rbac.enabled=false ───────────────────────────────────────────────────────

  - it: renders nothing when rbac.enabled is false
    set:
      rbac.enabled: false
    asserts:
      - hasDocuments:
          count: 0
