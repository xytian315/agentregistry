suite: ConfigMap
templates:
  - configmap.yaml

tests:
  - it: renders a ConfigMap by default
    asserts:
      - isKind:
          of: ConfigMap
      - hasDocuments:
          count: 1

  - it: has correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-config

  - it: has standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm

  - it: sets AGENT_REGISTRY_SERVER_ADDRESS
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_SERVER_ADDRESS
          value: ":8080"

  - it: sets AGENT_REGISTRY_AGENT_GATEWAY_PORT
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_AGENT_GATEWAY_PORT
          value: "21212"

  - it: sets AGENT_REGISTRY_RECONCILE_ON_STARTUP
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_RECONCILE_ON_STARTUP
          value: "true"

  - it: sets AGENT_REGISTRY_ENABLE_REGISTRY_VALIDATION
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_ENABLE_REGISTRY_VALIDATION
          value: "false"

  - it: sets AGENT_REGISTRY_ENABLE_ANONYMOUS_AUTH
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_ENABLE_ANONYMOUS_AUTH
          value: "false"

  - it: sets AGENT_REGISTRY_DISABLE_BUILTIN_SEED
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_DISABLE_BUILTIN_SEED
          value: "true"

  - it: does not include AGENT_REGISTRY_SEED_FROM when seedFrom is empty
    asserts:
      - notExists:
          path: data.AGENT_REGISTRY_SEED_FROM

  - it: includes AGENT_REGISTRY_SEED_FROM when seedFrom is set
    set:
      config.seedFrom: "https://example.com/seeds.json"
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_SEED_FROM
          value: "https://example.com/seeds.json"

  - it: overrides serverAddress
    set:
      config.serverAddress: ":9090"
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_SERVER_ADDRESS
          value: ":9090"

  - it: applies fullnameOverride
    set:
      fullnameOverride: myapp
    asserts:
      - equal:
          path: metadata.name
          value: myapp-config
