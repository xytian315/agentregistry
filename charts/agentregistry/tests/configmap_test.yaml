suite: ConfigMap
templates:
  - configmap.yaml

tests:
  - it: renders a ConfigMap by default
    asserts:
      - isKind:
          of: ConfigMap
      - hasDocuments:
          count: 1

  - it: has correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-agentregistry-config

  - it: has standard labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: agentregistry
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm

  - it: sets AGENT_REGISTRY_SERVER_ADDRESS
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_SERVER_ADDRESS
          value: ":8080"

  - it: sets AGENT_REGISTRY_AGENT_GATEWAY_PORT
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_AGENT_GATEWAY_PORT
          value: "21212"

  - it: sets AGENT_REGISTRY_MCP_PORT
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_MCP_PORT
          value: "31313"

  - it: sets AGENT_REGISTRY_ENABLE_REGISTRY_VALIDATION
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_ENABLE_REGISTRY_VALIDATION
          value: "false"

  - it: overrides serverAddress
    set:
      config.serverAddress: ":9090"
    asserts:
      - equal:
          path: data.AGENT_REGISTRY_SERVER_ADDRESS
          value: ":9090"

  - it: applies fullnameOverride
    set:
      fullnameOverride: myapp
    asserts:
      - equal:
          path: metadata.name
          value: myapp-config
