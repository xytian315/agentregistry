                  explode: false
                  schema:
                    type: boolean
                    description: Run validation and enrichment without mutating the store. Defaults to false.
            requestBody:
                content:
                    application/yaml:
                        schema:
                            type: string
                            format: binary
                required: true
            responses:
                "200":
                    description: OK
                    content:
