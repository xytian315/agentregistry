components:
    schemas:
        Agent:
            type: object
            additionalProperties: false
            properties:
                apiVersion:
                    type: string
                kind:
                    type: string
                metadata:
                    $ref: '#/components/schemas/ObjectMeta'
                spec:
                    $ref: '#/components/schemas/AgentSpec'
                status:
                    $ref: '#/components/schemas/Status'
            required:
                - metadata
                - spec
                - apiVersion
                - kind
        AgentSource:
            type: object
            additionalProperties: false
            properties:
                image:
                    type: string
                repository:
                    $ref: '#/components/schemas/Repository'
        AgentSpec:
            type: object
            additionalProperties: false
            properties:
                description:
                    type: string
                framework:
                    type: string
                language:
                    type: string
                mcpServers:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceRef'
                modelName:
                    type: string
                modelProvider:
                    type: string
                prompts:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceRef'
                skills:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceRef'
                source:
                    $ref: '#/components/schemas/AgentSource'
                title:
                    type: string
        ApplyResult:
            type: object
            additionalProperties: false
            properties:
                apiVersion:
                    type: string
                error:
                    type: string
                kind:
                    type: string
                name:
                    type: string
                namespace:
                    type: string
                status:
                    type: string
                version:
                    type: string
            required:
                - name
                - status
        ApplyResultsResponse:
            type: object
            additionalProperties: false
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/ApplyResult'
            required:
                - results
        Condition:
            type: object
            additionalProperties: false
            properties:
                lastTransitionTime:
                    type: string
                    format: date-time
                message:
                    type: string
                reason:
                    type: string
                status:
                    type: string
                type:
                    type: string
            required:
                - type
                - status
        Deployment:
            type: object
            additionalProperties: false
            properties:
                apiVersion:
                    type: string
                kind:
                    type: string
                metadata:
                    $ref: '#/components/schemas/ObjectMeta'
                spec:
                    $ref: '#/components/schemas/DeploymentSpec'
                status:
                    $ref: '#/components/schemas/Status'
            required:
                - metadata
                - spec
                - apiVersion
                - kind
        DeploymentSpec:
            type: object
            additionalProperties: false
            properties:
                desiredState:
                    type: string
                env:
                    type: object
                    additionalProperties:
                        type: string
                providerConfig:
                    type: object
                    additionalProperties: {}
                providerRef:
                    $ref: '#/components/schemas/ResourceRef'
                targetRef:
                    $ref: '#/components/schemas/ResourceRef'
            required:
                - targetRef
                - providerRef
        ErrorDetail:
            type: object
            additionalProperties: false
            properties:
                location:
                    type: string
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                message:
                    type: string
                    description: Error message text
                value:
                    description: The value at the given location
        ErrorModel:
            type: object
            additionalProperties: false
            properties:
                detail:
                    type: string
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                errors:
                    type: array
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                instance:
                    type: string
                    description: A URI reference that identifies the specific occurrence of the problem.
                    format: uri
                    examples:
                        - https://example.com/error-log/abc123
                status:
                    type: integer
                    description: HTTP status code
                    format: int64
                    examples:
                        - 400
                title:
                    type: string
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                type:
                    type: string
                    description: A URI reference to human-readable documentation for the error.
                    format: uri
                    default: about:blank
                    examples:
                        - https://example.com/errors/example
        HealthBody:
            type: object
            additionalProperties: false
            properties:
                platform_mode:
                    type: string
                    description: Platform mode
                    examples:
                        - docker
                    enum:
                        - docker
                        - kubernetes
                status:
                    type: string
                    description: Health status
                    examples:
                        - ok
            required:
                - status
        ListOutputAgentBody:
            type: object
            additionalProperties: false
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Agent'
                nextCursor:
                    type: string
            required:
                - items
        ListOutputDeploymentBody:
            type: object
            additionalProperties: false
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/Deployment'
                nextCursor:
                    type: string
            required:
                - items
        ListOutputMCPServerBody:
