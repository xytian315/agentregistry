            summary: List Agent (scoped by ?namespace)
            operationId: list-agents
            parameters:
                - name: namespace
                  in: query
                  description: Namespace (defaults to 'default'; 'all' lists across all namespaces).
                  explode: false
                  schema:
                    type: string
                    description: Namespace (defaults to 'default'; 'all' lists across all namespaces).
                - name: limit
                  in: query
                  description: Max items to return (default 50).
                  explode: false
                  schema:
                    type: integer
                    description: Max items to return (default 50).
                    format: int64
                    default: 50
                - name: cursor
                  in: query
                  description: Opaque pagination cursor.
                  explode: false
                  schema:
                    type: string
                    description: Opaque pagination cursor.
                - name: labels
                  in: query
                  description: 'Label selector: key=value,key2=value2.'
                  explode: false
                  schema:
                    type: string
                    description: 'Label selector: key=value,key2=value2.'
                - name: latestOnly
                  in: query
                  description: Only return rows with is_latest_version=true.
                  explode: false
                  schema:
                    type: boolean
                    description: Only return rows with is_latest_version=true.
                - name: includeTerminating
                  in: query
                  description: Include rows with a deletionTimestamp.
                  explode: false
                  schema:
                    type: boolean
                    description: Include rows with a deletionTimestamp.
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListOutputAgentBody'
                default:
                    description: Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
