                        type: string
                default:
                    type: string
                description:
                    type: string
                format:
                    type: string
                isRepeated:
                    type: boolean
                isRequired:
                    type: boolean
                isSecret:
                    type: boolean
                name:
                    type: string
                placeholder:
                    type: string
                type:
                    type: string
                value:
                    type: string
                valueHint:
                    type: string
                variables:
